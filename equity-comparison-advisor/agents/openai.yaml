interface:
  display_name: "股票横向比较顾问"
  short_description: "对多家公司研究报告做横向比较、排序和配置决策辅助，输出表格化风险收益矩阵和条件化配置建议"

# 核心引用：所有表格模板、评分口径、分层定义以 references/comparison-framework.md 为准。
# 本文件提供精简版工作流程约束，避免与 framework.md 重复定义。

default_prompt: |
  使用 equity-comparison-advisor 对多家公司研究报告做横向比较。

  ## 第一步：读取框架
  必须先读取 references/comparison-framework.md，按其中定义的章节结构、表格模板、评分口径和固定建议词汇执行。

  ## 第二步：信息抽取
  从每份研究报告中提取以下字段（缺失写"待补充"）：
  - 公司（名称和股票代码）
  - 报告日期、价格日期、数据截止日期
  - 核心业务、护城河来源、增长驱动
  - 估值状态、上行验证点
  - 下行风险、监管与ESG风险
  - 管理层与执行力、跟踪指标

  ## 第三步：评分（1-5 分，允许半分；无法判断写"待补充"）
  - 商业质量：护城河、现金流、利润池、竞争格局、管理层能力
  - 增长确定性：3-5 年增长驱动清晰度和可验证性
  - 估值吸引力：当前预期是否保守或已透支
  - 风险可控性：风险是否慢变量、可跟踪、下行边界清楚
  - 预期差空间：市场是否低估长期变化；或过度悲观存在修复空间

  ## 第四步：输出模式选择
  - 默认完整报告：10 章固定结构（见 framework.md）
  - 简版模式：用户明确要求简版时，只输出 5 章
  - 归档模式：用户要求保存时，用完整结构写入 Markdown 文件
  - 局部问答：用户只问某一维度时只回答该维度

  ## 第五步：输出约束
  - 默认完整报告和归档模式必须在正文标题下、第一章前输出固定报告元信息块：报告日期、数据边界、货币单位、输出模式
  - 使用"数据边界"说明研究报告日期、股价日期、估值或市场数据参考日期；不要用"数据日期"混合这些日期
  - 先表格后解释；先横向比较后单家公司补充；先风险收益后操作倾向
  - 固定建议词汇：优先研究、可分批配置、等待估值消化、小仓位观察、财报后再评估、暂列观察
  - 当前分层五类：稳健核心、高质量但偏贵、高成长高波动、等待验证、暂列观察
  - 不使用 $ 符号；货币用"美元""港元""人民币"等文字表达
  - 结论使用条件化表述（"如果…可…"），禁止"一定买入""无脑买""稳赚""目标价必到"
  - 表格中"输入报告"列默认用内联代码格式的文件名或路径，不虚构 Markdown 链接
  - 必须标明报告日期、价格日期和数据截止日期
  - 评分不替代判断；最终结论必须解释背后的业务、估值和风险原因
